<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Text</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="../icons/512.png" type="image/x-icon">
  </head>
  <body>
    <div id="inputfields">
      <input type="file" id="fileinput">
      <textarea id="textinput"></textarea>
      <br>
      <input type="number" id="amount" value=10>
      <select id="type">
        <option value="normal">Random</option>
        <option value="bold">Bold</option>
        <option value="heading">Headings</option>
        <option value="bold+heading">Bold and Headings</option>
        <option value="dates">Dates</option>
      </select>
      <input type="checkbox" id="strict">strict mode
      <br>
      <button id="startbtn" onclick="start()">Start</button>
      <p>preview:</p>
    </div>

    <div id="main">
    </div>

    <div id="navbar">
      <button id="backbtn" onclick="end()">back</button>
      <p id="prev"></p>
      <p id="keybinds">
      Tab: next&check
      Shift-Tab: previous
      Enter: check
      </p>
    </div>

    <div id="popup">
      <p id="pop-answer"></p>
      <p id="pop-correct"></p>
      <p id="pop-legend">T to mark correct, F to mark wrong</p>
    </div>

    <script type="module" src="scripts.js"></script>
  </body>
</html>

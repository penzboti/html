<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Text</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="../icons/512.png" type="image/x-icon">
  </head>
  <body>
    <div id="inputfields">
      <button id="startbtn" onclick="start()">Start</button>
      <br>
      <input type="file" id="fileinput">
      <textarea id="textinput"></textarea>
      <br>
      <input type="number" id="amount" value=10>
      <select id="type">
        <option value="normal">Random</option>
        <option value="bold">Bold</option>
        <option value="heading">Headings</option>
        <option value="bold+heading">Bold and Headings</option>
        <option value="dates">Dates</option>
      </select>
      <input type="checkbox" id="strict">strict mode
      <br>
      <p>preview:</p>
    </div>

    <div id="main">
    </div>

    <div id="navbar">
      <p id="prev"></p>
      <p id="current"></p>
      <p id="keybinds">
      [Tab] next ;
      [Shift-Tab] previous ;
      [Enter] check ;
      [Escape] end&exit
      </p>
    </div>

    <div id="popup">
      <p id="pop-title"></p>
      <p id="pop-answer"></p>
      <p id="pop-correct"></p>
      <p id="pop-legend"></p>
    </div>

    <script type="module" src="scripts.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKLM</title>
    <link rel="icon" href="../icons/512.png" type="image/x-icon">

    <style>
      body {
        min-height: 90vh;
      }
      dialog {
        position: fixed;
        top: 50vh;
        transform: translateY(-50%)
      }
    </style>
  </head>
  <body>
    <div id="inputs">
      <input id="input" placeholder="combinations">
      <input id="input2" placeholder="individual letters">
      <select id="select">
        <option value="english">English</option>
        <option value="german">German</option>
      </select>
      <input type="checkbox" id="checkbox"><label for="checkbox">dictionary links</label>
      <input type="checkbox" id="frequency"><label for="frequency">unfrequent words</label>
      <br>
      <input type="button" id="button" value="Start" onclick="start()">
      <button command="show-modal" commandfor="warning">About</button>
    </div>

    <div id="main">
    </div>

    <dialog id="warning">
      <p>This site loads a lot of words. This might take some time, and cell data (~2MB). Leave this site if this concerns you.</p>
      <p>Links are not that resource-intensive, it works fine on mobile.</p>
      <button command="close" commandfor="warning">Close</button>
    </dialog>

    <script>
      let words = "";
      let lang = "";
      let links = true;
      let unfrequent = frequency.checked;
      async function start() {
        if (lang !== select.value || unfrequent !== frequency.value) {
          lang = select.value;
          unfrequent = frequency.checked;
          frequency_txt = unfrequent ? "" : "-frequent";
          let url = `${window.location.href}/words/${lang}${frequency_txt}.txt`;
          words = await fetch(url).then(data => {return data.text()});
        }
        links = checkbox.checked;

        let combination = input.value.toLowerCase();
        let letters = input2.value.toLowerCase();
        if (combination === "" && letters === "") {
          alert("empty");
          return;
        }

        let arr = await words.split("\n").map(word => word.toLowerCase());
        if (combination !== "") arr = arr.filter(word => word.includes(combination))
        if (letters !== "") arr = arr.filter(word => {
          let n = letters.split('').filter(l => word.includes(l)).length
          return n === letters.length
        });
        arr.sort((a, b) => a.length - b.length || a.localeCompare(b));
        if (!links) main.innerText = `${arr.length} words:\n` + arr.join('\n');
        else {
          let wordurl = lang === "german" ? "https://www.verbformen.com/?w=" : "https://www.dictionary.com/browse/";
          arr = arr.map(word => `<a href="${wordurl}${word}" target="_blank">${word}</a>`)
          main.innerHTML =`<p>${arr.length} words:</p>` + arr.join('<br/>')
        }
      }

      document.addEventListener("keypress", e => {
        if (e.key === "Enter") start()
      })
    </script>
  </body>
</html>
